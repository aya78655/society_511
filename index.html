<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5年社会 復習クイズ｜九州地方・日本の人口</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f9f8f5; --surface: #ffffff; --surface2: #f2f1ee;
    --border: rgba(0,0,0,0.10); --border2: rgba(0,0,0,0.18);
    --text: #1a1a18; --text2: #6b6b67; --text3: #9b9b97;
    --green-bg: #eaf3de; --green-text: #27500a; --green-border: #97c459;
    --red-bg: #fcebeb; --red-text: #791f1f; --red-border: #f09595;
    --yellow-bg: #faeeda; --yellow-text: #633806; --yellow-border: #efcc7a;
    --accent: #1a1a18; --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
  }
  body { font-family: 'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
  .container { width: 100%; max-width: 580px; }
  .header { text-align: center; margin-bottom: 2rem; }
  .header .tag { display: inline-block; font-size: 19px; letter-spacing: 0.08em; color: var(--text2); border: 0.5px solid var(--border2); border-radius: 20px; padding: 4px 12px; margin-bottom: 12px; }
  .header h1 { font-size: 30px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 6px; }
  .header p { font-size: 18px; color: var(--text2); }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1rem; }
  .start-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
  .start-item { background: var(--surface2); border-radius: var(--radius-sm); padding: 12px 14px; }
  .start-item .label { font-size: 19px; color: var(--text3); margin-bottom: 4px; }
  .start-item .value { font-size: 18px; font-weight: 500; }
  .progress-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; }
  .progress-label { font-size: 18px; color: var(--text2); white-space: nowrap; }
  .progress-bar-bg { flex: 1; height: 3px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s ease; }
  .q-category { font-size: 19px; color: var(--text3); letter-spacing: 0.05em; margin-bottom: 10px; }
  .q-text { font-size: 19px; line-height: 1.8; color: var(--text); white-space: pre-line; }
  .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .ans-input { flex: 1; padding: 12px 14px; font-size: 19px; font-family: inherit; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); outline: none; transition: border-color 0.15s; }
  .ans-input:focus { border-color: var(--accent); }
  .ans-input:disabled { background: var(--surface2); }
  .btn { display: block; width: 100%; padding: 13px; font-size: 18px; font-family: inherit; font-weight: 500; text-align: center; background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius-md); cursor: pointer; color: var(--text); transition: background 0.15s; }
  .btn:hover { background: var(--surface2); }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #333; }
  .btn-sm { padding: 10px 16px; font-size: 19px; width: auto; display: inline-block; }
  .hint-toggle { padding: 8px 14px; font-size: 19px; font-family: inherit; background: var(--yellow-bg); border: 0.5px solid var(--yellow-border); border-radius: var(--radius-sm); cursor: pointer; color: var(--yellow-text); margin-bottom: 10px; transition: background 0.15s; }
  .hint-toggle:hover { background: #f5dfa8; }
  .hint-box { background: var(--yellow-bg); border: 0.5px solid var(--yellow-border); border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 10px; }
  .hint-box .hint-label { font-size: 19px; color: var(--yellow-text); font-weight: 600; margin-bottom: 8px; letter-spacing: 0.05em; }
  .hint-choices { display: flex; flex-wrap: wrap; gap: 6px; }
  .hint-choice { padding: 5px 12px; background: var(--surface); border: 0.5px solid var(--yellow-border); border-radius: 20px; font-size: 19px; cursor: pointer; color: var(--yellow-text); transition: background 0.15s; }
  .hint-choice:hover { background: var(--yellow-border); }
  .answer-box { border-radius: var(--radius-sm); padding: 1rem 1.25rem; font-size: 18px; line-height: 1.7; margin-bottom: 10px; }
  .answer-box.correct { background: var(--green-bg); border: 0.5px solid var(--green-border); color: var(--green-text); }
  .answer-box.wrong { background: var(--red-bg); border: 0.5px solid var(--red-border); color: var(--red-text); }
  .answer-box.neutral { background: var(--surface2); border: 0.5px solid var(--border); color: var(--text); }
  .answer-box .mark { font-weight: 600; margin-bottom: 6px; font-size: 19px; }
  .answer-box .correct-ans { font-weight: 500; margin-bottom: 8px; }
  .answer-box .exp { font-size: 19px; opacity: 0.85; white-space: pre-line; }
  .multi-check-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .multi-check { display: flex; align-items: center; gap: 6px; padding: 7px 12px; border: 0.5px solid var(--border2); border-radius: 20px; font-size: 19px; cursor: pointer; background: var(--surface); }
  .multi-check input { width: 14px; height: 14px; cursor: pointer; }
  .section-btn { background: var(--surface2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 8px 14px; font-size: 19px; font-family: inherit; cursor: pointer; color: var(--text); transition: background 0.15s; }
  .section-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .section-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .result-score { font-size: 52px; font-weight: 600; letter-spacing: -0.03em; margin-bottom: 6px; text-align: center; }
  .result-msg { font-size: 19px; color: var(--text2); text-align: center; margin-bottom: 1.5rem; }
  .result-list { display: flex; flex-direction: column; margin-bottom: 1.5rem; }
  .result-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--border); font-size: 19px; }
  .result-item .icon { font-weight: 600; min-width: 18px; font-size: 18px; }
  .result-item .icon.ok { color: var(--green-text); }
  .result-item .icon.ng { color: var(--red-text); }
  .result-item .icon.memo { color: var(--text2); }
  .result-item .detail { color: var(--text2); line-height: 1.5; }
  .hidden { display: none !important; }
  .action-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .action-row .btn { flex: 1; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="tag">5年社会 予習シリーズ 第11回</div>
    <h1>全問題 復習クイズ</h1>
    <p>全 <span id="total-count"></span> 問</p>
  </div>

  <div id="start-screen">
    <div class="card">
      <div style="font-size:13px;color:var(--text2);margin-bottom:12px;">出題範囲を選んでください（複数選択可）</div>
      <div class="section-row">
        <button class="section-btn active" data-section="1" onclick="toggleSection(this)">第11回①九州</button>
        <button class="section-btn active" data-section="2" onclick="toggleSection(this)">第11回②火山</button>
        <button class="section-btn active" data-section="3" onclick="toggleSection(this)">第11回③人口</button>
        <button class="section-btn active" data-section="4" onclick="toggleSection(this)">第11回④南西諸島</button>
        <button class="section-btn active" data-section="5" onclick="toggleSection(this)">第11回⑤九州旅行</button>
        <button class="section-btn active" data-section="6" onclick="toggleSection(this)">第11回⑥8県の表</button>
        <button class="section-btn active" data-section="7" onclick="toggleSection(this)">第12回 中国・四国</button>
        <button class="section-btn active" data-section="8" onclick="toggleSection(this)">第13回 近畿</button>
        <button class="section-btn active" data-section="9" onclick="toggleSection(this)">第14回 中部</button>
      </div>
      <div class="start-grid" style="margin-bottom:1.25rem;">
        <div class="start-item"><div class="label">第11回</div><div class="value">九州地方・南西諸島</div></div>
        <div class="start-item"><div class="label">第12回</div><div class="value">中国・四国地方</div></div>
        <div class="start-item"><div class="label">第13回</div><div class="value">近畿地方</div></div>
        <div class="start-item"><div class="label">第14回</div><div class="value">中部地方</div></div>
      </div>
      <button class="btn btn-primary" onclick="startQuiz()">クイズスタート →</button>
    </div>
  </div>

  <div id="quiz-screen" class="hidden">
    <div class="progress-wrap">
      <div class="progress-label" id="q-label"></div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog"></div></div>
      <div class="progress-label" id="q-counter"></div>
    </div>
    <div class="card">
      <div class="q-category" id="q-category"></div>
      <div class="q-text" id="q-text"></div>
    </div>

    <div id="input-area">
      <div class="input-row">
        <input class="ans-input" id="ans-input" type="text" placeholder="ここに答えを入力…" autocomplete="off" />
        <button class="btn btn-primary btn-sm" id="submit-btn" onclick="submitAnswer()">答える</button>
      </div>
      <div id="hint-section">
        <button class="hint-toggle" id="hint-btn" onclick="toggleHint()">💡 ヒント（選択肢）を見る</button>
        <div id="hint-box" class="hint-box hidden">
          <div class="hint-label">ヒント：選択肢</div>
          <div class="hint-choices" id="hint-choices"></div>
        </div>
      </div>
      <div id="multi-area" class="hidden">
        <div style="font-size:13px;color:var(--text2);margin-bottom:8px;">正しいものをすべて選んでください</div>
        <div class="multi-check-row" id="multi-checks"></div>
        <button class="hint-toggle" id="hint-btn-multi" onclick="toggleHint()">💡 ヒント（選択肢の内容）を見る</button>
        <div id="hint-box-multi" class="hint-box hidden">
          <div class="hint-label">ヒント：各選択肢</div>
          <div id="hint-choices-multi" style="font-size:13px;line-height:1.8;color:var(--yellow-text);"></div>
        </div>
        <button class="btn btn-primary" style="margin-top:10px;" onclick="submitMulti()">答える</button>
      </div>
    </div>

    <div id="answer-area" class="hidden">
      <div id="answer-box" class="answer-box"></div>
      <button class="btn" onclick="nextQuestion()">次の問題へ →</button>
    </div>
  </div>

  <div id="result-screen" class="hidden">
    <div class="card">
      <div class="result-score" id="result-score"></div>
      <div class="result-msg" id="result-msg"></div>
      <div class="result-list" id="result-detail"></div>
      <button class="btn btn-primary" style="margin-bottom:8px;" onclick="retryWrong()" id="retry-wrong-btn">まちがえた問題だけもう一度 →</button>
      <div class="action-row">
        <button class="btn" onclick="restartQuiz()">全問もう一度</button>
        <button class="btn" onclick="goHome()">トップへ</button>
      </div>
    </div>
  </div>
</div>

<script>
const allQuestions = [
  { section:1, category:"大問1・問1", text:"沖縄の「□城」——世界文化遺産にも登録されているこのお城の「□」に入る漢字は？", type:"free", hints:["首里","中城","今帰仁","座喜味"], answer:"首里", explanation:"首里城（しゅりじょう）が正解。琉球王国の城で、世界文化遺産に登録されています。" },
  { section:1, category:"大問1・問1", text:"沖縄の世界文化遺産「□王国」の遺跡がみられます。□に入る漢字2字は？", type:"free", hints:["琉球","薩摩","大和","鎌倉"], answer:"琉球", explanation:"琉球王国（りゅうきゅうおうこく）が正解。現在の沖縄県にあった王国です。" },
  { section:1, category:"大問1・問1", text:"福岡県で、筑紫平野に位置しゴム製品や繊維物が有名な市（人口3番目）はどこ？（○○市）", type:"free", hints:["久留米","大牟田","飯塚","直方"], answer:"久留米", altAnswers:["久留米市"], explanation:"久留米市（くるめし）が正解。ブリヂストン発祥地としても有名で、ゴム製品の生産がさかんです。" },
  { section:1, category:"大問1・問2", text:"福岡県で「あまおう」という品種の栽培がさかんな農作物はどれ？", type:"free", hints:["いちご","トマト","みかん","ぶどう"], answer:"いちご", explanation:"「あまおう」はいちごの品種です。福岡県は全国有数のいちごの産地です。" },
  { section:1, category:"大問1・問3", text:"九州地方を流れる三大急流のひとつで、熊本県を流れる川の名前は？（○○川）", type:"free", hints:["球磨川","筑後川","大淀川","吉野川"], answer:"球磨川", altAnswers:["球磨"], explanation:"球磨川（くまがわ）が正解。最上川・富士川とならぶ日本三大急流のひとつです。" },
  { section:1, category:"大問1・問4", text:"沖縄では降水量が多いのに水不足になりがちでした。その理由を簡単に答えなさい。", type:"text", answer:"川が短く急で、雨水がすぐ海に流れ出てしまうから", explanation:"沖縄の川は短くて急勾配。雨が降ってもすぐ海へ流れ出てしまい、水をためておくことができません。また島の岩盤が水を通しやすい性質も影響しています。" },
  { section:1, category:"大問1・問5", text:"沖縄島の面積のうちアメリカ軍基地がしめる割合に最も近いものは？", type:"free", hints:["約8%","約15%","約30%","約70%"], answer:"約15%", explanation:"沖縄島の約15%がアメリカ軍基地です。" },
  { section:1, category:"大問1・問6-1", text:"福岡市の気候の特徴として正しいものは？（ア〜エで答えてもOK）\nア：年平均気温15.0℃・年降水量2402mm\nイ：年平均気温17.7℃・年降水量2511mm\nウ：年平均気温15.8℃・年降水量1528mm\nエ：年平均気温17.3℃・年降水量1687mm", type:"free", hints:["ア（金沢市）","イ（宮崎市）","ウ（東京）","エ（福岡市）"], answer:"エ", altAnswers:["エ（福岡市）","年平均気温17.3℃・年降水量1687mm"], explanation:"エ（年平均気温17.3℃・年降水量1687mm）が福岡市。アは金沢市（冬に降水多い日本海側）、イは宮崎市（夏の降水量が非常に多い）、ウは東京です。" },
  { section:1, category:"大問1・問6-2", text:"福岡市にある、山陽新幹線と九州新幹線の起点となる駅の名前は？（○○駅）", type:"free", hints:["博多","福岡","小倉","新福岡"], answer:"博多", altAnswers:["博多駅"], explanation:"博多駅（はかたえき）が正解。山陽新幹線と九州新幹線の2つの新幹線の起点です。" },
  { section:1, category:"大問1・問7", text:"北九州市の工業について、正しい文をすべて選んでください。\nア・イ・ウ・エ の記号で答えなさい。\nア：大戦前、石炭を用いて鉄鋼を生産\nイ：高度経済成長期に四大公害病の1つが発生\nウ：金属工業の割合が最も多い\nエ：エコタウン事業・SDGsモデル都市", type:"multi", hints:["ア","イ","ウ","エ"], hintDetails:["ア：大戦前、筑豊炭田の石炭で鉄鋼生産（八幡製鉄所）","イ：四大公害病＝水俣病・第二水俣病・イタイイタイ病・四日市ぜんそく","ウ：現在の北九州工業地域は機械工業が最多","エ：エコタウン事業が進められ、SDGsモデル都市に選定"], answer:["ア","エ"], explanation:"正解はア・エ。\nイ→×：北九州の公害は四大公害病に含まれない。\nウ→×：現在は機械工業の割合が最も多い。" },
  { section:1, category:"大問1・問8", text:"筑紫平野を流れ、下流が福岡県と佐賀県の県境となっている川の名前は？（○○川）", type:"free", hints:["筑後川","球磨川","大淀川","遠賀川"], answer:"筑後川", altAnswers:["筑後"], explanation:"筑後川（ちくごがわ）が正解。「筑紫次郎」ともよばれる暴れ川で、有明海にそそぎます。" },

  { section:2, category:"大問2・問1", text:"阿蘇山がある県はどこ？（○○県）", type:"free", hints:["熊本県","大分県","宮崎県","鹿児島県"], answer:"熊本県", altAnswers:["熊本"], explanation:"阿蘇山は熊本県の北東部に位置します。" },
  { section:2, category:"大問2・問1", text:"阿蘇山の火山活動によってできた広大なくぼ地を何という？（カタカナ）", type:"free", hints:["カルデラ","マグマ","カルスト","クレーター"], answer:"カルデラ", explanation:"カルデラが正解。阿蘇山のカルデラは世界最大級で、その中に人が住んでいます。" },
  { section:2, category:"大問2・問1", text:"長崎県の島原半島にある、1991年に大規模な噴火があった火山は？", type:"free", hints:["雲仙岳","霧島山","桜島","阿蘇山"], answer:"雲仙岳", altAnswers:["雲仙"], explanation:"雲仙岳（うんぜんだけ）が正解。普賢岳はその一部で、1991年の噴火では多くの犠牲者が出ました。" },
  { section:2, category:"大問2・問2", text:"桜島は噴火によってどの半島と陸続きになりましたか？（○○半島）", type:"free", hints:["知多半島","紀伊半島","薩摩半島","大隅半島"], answer:"大隅半島", altAnswers:["大隅"], explanation:"大隅半島（おおすみはんとう）が正解。鹿児島県東部の昔の国の名は「大隅国」です。" },
  { section:2, category:"大問2・問3", text:"福岡空港を2023年に利用した外国人の半分以上は、どの国の人でしたか？", type:"free", hints:["韓国","中国","アメリカ","オーストラリア"], answer:"韓国", explanation:"福岡は韓国に近く、釜山からフェリーでも来られる距離。韓国からの訪問者が最も多いです。" },
  { section:2, category:"大問2・問4", text:"九州地方は「□」の生産がさかんで「シリコンアイランド」とよばれてきました。□に入るものは？", type:"free", hints:["半導体","自動車","陶磁器","プラスチック"], answer:"半導体", explanation:"半導体（はんどうたい）が正解。シリコンは半導体の材料です。九州各地に工場が集まっています。" },
  { section:2, category:"大問2・問5-1", text:"長崎県に属し、昔から朝鮮半島との橋渡し役をつとめてきた島の名前は？（○○島）", type:"free", hints:["対馬","壱岐","五島","種子島"], answer:"対馬", altAnswers:["対馬島"], explanation:"対馬（つしま）が正解。朝鮮半島まで約50kmと近く、古くから交流の拠点でした。" },
  { section:2, category:"大問2・問5-2", text:"長崎県と佐賀県を結ぶ□新幹線には「温泉」という駅が2つあります。□を漢字3字で答えなさい。", type:"free", hints:["西九州","九州南","肥前長崎","西長崎"], answer:"西九州", explanation:"西九州（にしきゅうしゅう）新幹線が正解。「武雄温泉」駅と「嬉野温泉」駅の2つに「温泉」が入っています。" },
  { section:2, category:"大問2・問6", text:"鹿児島県東部が面する、のりの養殖がさかんな海の名前は？（○○海）", type:"free", hints:["有明海","八代海","錦江湾","周防灘"], answer:"有明海", altAnswers:["有明"], explanation:"有明海（ありあけかい）が正解。長崎・佐賀・福岡・熊本の4県に面し、潮の干満差が大きくのりの養殖がさかんです。" },
  { section:2, category:"大問2・問7-1", text:"地熱発電の発電量が全国第1位（2023年）で、別府温泉があることでも知られる県はどこ？（○○県）", type:"free", hints:["大分県","鹿児島県","熊本県","宮崎県"], answer:"大分県", altAnswers:["大分"], explanation:"大分県（おおいたけん）が正解。別府温泉・由布院温泉があり、地熱発電が全国1位です。" },
  { section:2, category:"大問2・問7-2", text:"鹿児島県の農業について、正しくないものを記号で答えなさい。\nア：シラス台地は水もちがよく、茶の栽培がさかん\nイ：茶の生産量は全国1・2位を争っている\nウ：ぶたの飼育数（2023年）は全国第1位\nエ：さつまいもの生産量（2023年）は全国第1位", type:"free", hints:["ア","イ","ウ","エ"], answer:"ア", explanation:"アが誤り。シラス台地は火山灰からなるため、水はけがよい（水もちが悪い）のが正しい。水もちが悪いからこそ、茶・さつまいも・畜産がさかんになりました。" },
  { section:2, category:"大問2・問9", text:"九州地方最高峰の宮之浦岳があり、世界自然遺産にも登録されている島はどれ？", type:"free", hints:["屋久島","沖ノ島","奄美大島","西表島"], answer:"屋久島", explanation:"屋久島（やくしま）が正解。宮之浦岳（1936m）があり、1993年に世界自然遺産に登録されました。" },

  { section:3, category:"大問3・問1", text:"1920年から始まり5年ごとに国がいっせいに人口・年齢・性別・職業などを調べる調査の名前は？", type:"free", hints:["国勢調査","農業センサス","経済センサス","人口調査"], answer:"国勢調査", explanation:"国勢調査（こくせいちょうさ）が正解。2025年で22回目となります。" },
  { section:3, category:"大問3・問2", text:"現在、日本で「高齢者」とされる年齢は何歳以上？", type:"free", hints:["65歳","60歳","70歳","75歳"], answer:"65歳", altAnswers:["65"], explanation:"65歳以上が高齢者です。" },
  { section:3, category:"大問3・問2", text:"現在、日本で65歳以上の高齢者が人口にしめる割合は約何割？", type:"free", hints:["約3割","約2割","約4割","約1割"], answer:"約3割", altAnswers:["3割","3"], explanation:"65歳以上の割合は約3割（C=3）です。" },
  { section:3, category:"大問3・問3", text:"次のI・IIの正誤の組み合わせをア〜エで答えなさい。\nI：沖縄県では第一次産業人口の割合が3割をこえている\nII：高度経済成長期の1970年には第二次産業が第三次産業の人数を上回っていた\nア：I正・II正　イ：I正・II誤　ウ：I誤・II正　エ：I誤・II誤", type:"free", hints:["エ（I誤・II誤）","ア（I正・II正）","イ（I正・II誤）","ウ（I誤・II正）"], answer:"エ", altAnswers:["エ（I誤・II誤）","I誤・II誤"], explanation:"I→誤：観光業がさかんな沖縄県は第三次産業が8割超。第一次産業は3割をこえていない。\nII→誤：1970年時点ですでに第三次産業の方が多かった。" },
  { section:3, category:"大問3・問4", text:"日本の人口密度に最も近いものは？（国土面積38万㎢、総人口1億2400万人）", type:"free", hints:["330人/㎢","33人/㎢","3300人/㎢","33000人/㎢"], answer:"330人/㎢", altAnswers:["330"], explanation:"1億2400万÷38万＝約326人/㎢。最も近いのは330人/㎢です。" },
  { section:3, category:"大問3・問5", text:"世界で最も人口が多い国はどこ？", type:"free", hints:["インド","中国","アメリカ","インドネシア"], answer:"インド", explanation:"インドが正解。近年、中国を抜いて世界1位となりました。" },
  { section:3, category:"大問3・問5", text:"インドが位置する大陸の名前は？（カタカナで）", type:"free", hints:["ユーラシア大陸","アジア大陸","アフリカ大陸","オーストラリア大陸"], answer:"ユーラシア大陸", altAnswers:["ユーラシア"], explanation:"ユーラシア大陸が正解。ヨーロッパとアジアを合わせた世界最大の大陸です。" },
  { section:3, category:"大問3・問6", text:"三大都市圏（東京・大阪・名古屋の中心から半径50km以内）の人口が総人口にしめる割合は？", type:"free", hints:["約50%","約35%","約65%","約80%"], answer:"約50%", altAnswers:["50%","50","イ"], explanation:"三大都市圏には日本の総人口の約50%が集中しています。" },
  { section:3, category:"大問3・問7", text:"人口が減り、地域の産業がおとろえ、社会をささえるしくみが弱まるほどの状態を何という？（2字）", type:"free", hints:["過疎","過密","過剰","限界"], answer:"過疎", explanation:"過疎（かそ）が正解。反対に人口が集中しすぎる状態を「過密」といいます。" },
  { section:3, category:"大問3・問8-1", text:"日本標準時子午線（東経135度）との経度差が最も大きい島はどれ？（ア〜エで答えてもOK）\nア：東の端の島・南鳥島\nイ：東の端の島・沖ノ鳥島\nウ：南の端の島・南鳥島\nエ：南の端の島・沖ノ鳥島", type:"free", hints:["ア（南鳥島・東の端）","イ（沖ノ鳥島・東の端）","ウ（南鳥島・南の端）","エ（沖ノ鳥島・南の端）"], answer:"ア", altAnswers:["ア（南鳥島・東の端）","南鳥島"], explanation:"南鳥島は東経約154度で、135度との差は約19度。東の端の島が正しく、それは南鳥島です。" },
  { section:3, category:"大問3・問8-2", text:"沖縄県の石垣島の北北西に位置する、魚釣島などからなる島々を何といいますか？", type:"free", hints:["尖閣諸島","南西諸島","先島諸島","八重山諸島"], answer:"尖閣諸島", altAnswers:["尖閣"], explanation:"尖閣諸島（せんかくしょとう）が正解。魚釣島などからなり、石垣島の北北西に位置します。" },
  { section:3, category:"大問3・問9", text:"日本で地震が多い理由として、日本の付近に4枚の「□」の境界が集まっています。□をカタカナで答えなさい。", type:"free", hints:["プレート","マグマ","マントル","マグニチュード"], answer:"プレート", explanation:"プレートが正解。日本付近には太平洋・フィリピン海・北アメリカ・ユーラシアの4枚が集まっています。" },

  // === 第11回④ 南西諸島・南西諸島の島々 ===
  { section:4, category:"第11回④・問1", text:"日本の西の端となっている島の名前は？", type:"free", hints:["与那国島","西表島","石垣島","宮古島"], answer:"与那国島", explanation:"与那国島（よなぐにじま）が正解。日本最西端の島で、沖縄県に属します。" },
  { section:4, category:"第11回④・問2", text:"屋久島の世界自然遺産で有名な、樹齢2000年をこえる木の種類は？", type:"free", hints:["すぎ","ぶな","ひば","ひのき"], answer:"すぎ", explanation:"縄文すぎ（スギ）が正解。屋久杉として知られ、樹齢2000年を超えるものもあります。" },
  { section:4, category:"第11回④・問3", text:"屋久島の南にある、世界自然遺産に登録されており、鹿児島県に属する島は？", type:"free", hints:["奄美大島","西表島","種子島","対馬"], answer:"奄美大島", explanation:"奄美大島（あまみおおしま）が正解。鹿児島県に属し、2021年に世界自然遺産に登録されました。" },
  { section:4, category:"第11回④・問4-1", text:"沖縄島の県庁所在地の都市名は？", type:"free", hints:["那覇市","名護市","宜野湾市","浦添市"], answer:"那覇市", explanation:"那覇市（なはし）が正解。沖縄県の県庁所在地です。" },
  { section:4, category:"第11回④・問4-2", text:"沖縄島の面積のうちアメリカ軍基地がしめる割合は約何％？", type:"free", hints:["約30%","約70%","約50%","約15%"], answer:"約30%", explanation:"沖縄島の約30%がアメリカ軍基地です（沖縄県全体では約15%）。" },
  { section:4, category:"第11回④・問4-3", text:"沖縄県について正しくないものはどれ？（ア〜エ）\nア：第三次産業人口の割合が80%超\nイ：きくの生産量が愛知県と並んで全国有数\nウ：沖ノ島で航海の安全をいのる儀式が行われた\nエ：1972年にアメリカ軍による支配が終わり日本に復帰", type:"free", hints:["ウ","ア","イ","エ"], answer:"ウ", explanation:"ウが誤り。沖ノ島（おきのしま）は福岡県に属する島で、沖縄県ではありません。沖縄県の復帰は1972年（エは正しい）。" },
  { section:4, category:"第11回④・問5", text:"宮古島では水を通しやすい土地の性質を利用して水不足に備えています。その方法は？（15字以内）", type:"text", answer:"地下ダムに雨水をためること。", explanation:"宮古島では地下ダムをつくり、水を通しやすい地盤の下に雨水をためて水不足に備えています。" },
  { section:4, category:"第11回④・問6", text:"端島（軍艦島）炭坑を含む世界文化遺産は「明治日本の□遺産」とよばれます。□に入ることばは？", type:"free", hints:["産業革命","文化革命","近代化","工業化"], answer:"産業革命", explanation:"「明治日本の産業革命遺産」が正解。製鉄・造船・石炭産業に関する遺産群です。" },
  { section:4, category:"第11回④・問7", text:"長崎県にある、造船業がさかんな都市はどれ？", type:"free", hints:["佐世保","唐津","久留米","宮若"], answer:"佐世保", explanation:"佐世保市（させぼし）が正解。長崎県北部に位置し、造船業が発達しています。" },

  // === 第11回⑤ 九州旅行会話文 ===
  { section:5, category:"第11回⑤・問1A", text:"九州新幹線で鹿児島中央駅まで行けます。鹿児島中央駅がある「□県」の□は？", type:"free", hints:["鹿児島","宮崎","熊本","大分"], answer:"鹿児島", explanation:"鹿児島県の鹿児島中央駅が正解。九州新幹線の終点です。" },
  { section:5, category:"第11回⑤・問1B", text:"東海道・山陽新幹線の終着駅「□駅」の□は？（福岡市にある駅）", type:"free", hints:["博多","小倉","新大阪","広島"], answer:"博多", explanation:"博多駅（はかたえき）が正解。山陽新幹線の下り終着駅です。" },
  { section:5, category:"第11回⑤・問2-1", text:"桜島と陸続きとなっている半島はどれ？", type:"free", hints:["大隅半島","薩摩半島","国東半島","紀伊半島"], answer:"大隅半島", explanation:"大隅半島（おおすみはんとう）が正解。鹿児島県東部の半島です。" },
  { section:5, category:"第11回⑤・問2-2", text:"熊本県にある、広大なカルデラで知られる火山の名前は？（○○山）", type:"free", hints:["阿蘇山","霧島山","雲仙岳","桜島"], answer:"阿蘇山", explanation:"阿蘇山（あそさん）が正解。世界最大級のカルデラを持ちます。" },
  { section:5, category:"第11回⑤・問3-1", text:"筑紫平野についてのI・IIの正誤の組み合わせは？\nI：筑後川が流れ、有明海に注いでいる\nII：クリークとよばれる水路がはりめぐらされていたが、多くは埋め立てられた", type:"free", hints:["ア（I正・II正）","イ（I正・II誤）","ウ（I誤・II正）","エ（I誤・II誤）"], answer:"ア（I正・II正）", altAnswers:["ア","I正・II正"], explanation:"I・IIともに正しい。筑後川は有明海に注ぎ、クリークは稲作用の水路でしたが現在は多く埋め立てられました。" },
  { section:5, category:"第11回⑤・問3-2", text:"九州新幹線が渡る三大急流の1つの川の名は？（○○川）", type:"free", hints:["球磨川","筑後川","大淀川","吉野川"], answer:"球磨川", explanation:"球磨川（くまがわ）が正解。熊本県を流れる日本三大急流のひとつです。" },
  { section:5, category:"第11回⑤・問4", text:"福岡市と同じ県にある政令指定都市で、県庁所在地ではない都市はどこ？", type:"free", hints:["北九州市","久留米市","大牟田市","飯塚市"], answer:"北九州市", explanation:"北九州市（きたきゅうしゅうし）が正解。政令指定都市としては福岡市より先に指定されました。" },
  { section:5, category:"第11回⑤・問6", text:"九州地方の伝統的工芸品の焼き物で、佐賀県でつくられているものは？", type:"free", hints:["有田焼","清水焼","九谷焼","信楽焼"], answer:"有田焼", explanation:"有田焼（ありたやき）が正解。佐賀県有田町で400年以上の歴史がある磁器です。" },
  { section:5, category:"第11回⑤・問6", text:"東海道・山陽新幹線が通る海峡（九州と本州をへだてる）は「□海峡」。□は？", type:"free", hints:["関門","豊後","対馬","大隅"], answer:"関門", explanation:"関門海峡（かんもんかいきょう）が正解。福岡県と山口県の間の海峡です。" },
  { section:5, category:"第11回⑤・問8-1", text:"新幹線が通っていない九州の県のうち、宮崎県の生産量・飼育頭数が全国2位以内の農産物・家畜の組み合わせは？", type:"free", hints:["ピーマン・ぶた","トマト・牛肉","トマト・ぶた","ピーマン・牛肉"], answer:"ピーマン・ぶた", altAnswers:["エ","ピーマン・豚"], explanation:"宮崎県はピーマンの生産量と豚の飼育頭数がともに全国上位です。" },

  // === 第11回⑥ 九州8県の表 ===
  { section:6, category:"第11回⑥・問1", text:"福岡県にある政令指定都市のうち、県庁所在地ではない都市は？", type:"free", hints:["北九州市","久留米市","大牟田市","飯塚市"], answer:"北九州市", explanation:"北九州市が正解。福岡県には福岡市と北九州市の2つの政令指定都市があります。" },
  { section:6, category:"第11回⑥・問2", text:"鹿児島県について正しいものはどれ？（ア〜エ）\nア：種子島が世界文化遺産\nイ：県の東部に薩摩、西部に大隅半島\nウ：ぶたの飼育頭数が日本一\nエ：水はけの悪いシラス台地で茶の栽培がさかん", type:"free", hints:["ウ","ア","イ","エ"], answer:"ウ", explanation:"ウが正解。鹿児島県は豚の飼育頭数が全国上位（2023年時点で1位または2位）です。イは逆（東部が大隅、西部が薩摩）。エのシラス台地は水はけがよい（悪いではない）。" },
  { section:6, category:"第11回⑥・問3-1", text:"沖縄県にあった「□王国」の□は？（約600年前〜約140年前）", type:"free", hints:["琉球","薩摩","大和","鎌倉"], answer:"琉球", explanation:"琉球王国（りゅうきゅうおうこく）が正解。" },
  { section:6, category:"第11回⑥・問3-2", text:"琉球王国の都につくられ、世界文化遺産に登録されている城は「□城」。□は？", type:"free", hints:["首里","中城","今帰仁","座喜味"], answer:"首里", explanation:"首里城（しゅりじょう）が正解。" },
  { section:6, category:"第11回⑥・問3-3", text:"日本にあるアメリカ軍基地のうち、沖縄県にある基地はどのくらいをしめていますか？", type:"free", hints:["約70%","約30%","約50%","約90%"], answer:"約70%", explanation:"約70%が正解。日本全体のアメリカ軍基地の約70%が沖縄県に集中しています。" },
  { section:6, category:"第11回⑥・問5", text:"熊本県の生産量がほとんどを占める、たたみ表の原料となる工芸作物は？", type:"free", hints:["いぐさ","麻","綿","茶"], answer:"いぐさ", explanation:"いぐさ（い草）が正解。熊本県は全国のい草生産量の大部分を占めます。" },
  { section:6, category:"第11回⑥・問7-1", text:"福岡・熊本・長崎・佐賀の4県が面する、のりの養殖がさかんな海は？（○○海・漢字3字）", type:"free", hints:["有明海","八代海","錦江湾","玄界灘"], answer:"有明海", explanation:"有明海（ありあけかい）が正解。漢字3字で「有明海」です。" },
  { section:6, category:"第11回⑥・問7-2", text:"山陽新幹線が通る県を、次から選びなさい。（あ＝福岡・い＝熊本・う＝鹿児島・お＝長崎・き＝佐賀）", type:"free", hints:["あ（福岡）","い（熊本）","う（鹿児島）","き（佐賀）"], answer:"あ（福岡）", altAnswers:["あ","福岡"], explanation:"山陽新幹線は山口県から福岡県（博多駅）まで通っています。九州新幹線は福岡・熊本・鹿児島を通ります。" },
  // === 第12回 中国・四国地方 ===
  { section:7, category:"第12回・問1-1", text:"愛媛県でタオルの生産がさかんな都市はどこ？", type:"free", hints:["今治市","松山市","宇和島市","新居浜市"], answer:"今治市", explanation:"今治市（いまばりし）が正解。国内タオル生産量の約60%を占めます。" },
  { section:7, category:"第12回・問1-1", text:"岡山県倉敷市の水島地区にあるのはどんな工業施設？", type:"free", hints:["石油化学コンビナートと製鉄所","自動車工場","造船所","セメント工場"], answer:"石油化学コンビナートと製鉄所", explanation:"水島地区には石油化学コンビナートと製鉄所の両方があります。" },
  { section:7, category:"第12回・問1-3", text:"広島市について正しいものはどれ？（ア〜エ）\nI：太田川の三角州の上に広がり人口100万人超\nII：世界文化遺産の原爆ドームがある", type:"free", hints:["ア（I正・II正）","イ（I正・II誤）","ウ（I誤・II正）","エ（I誤・II誤）"], answer:"ア（I正・II正）", altAnswers:["ア","I正・II正"], explanation:"I・IIともに正しい。広島市は太田川デルタ上に発展し、人口約120万人の政令指定都市です。" },
  { section:7, category:"第12回・問2", text:"徳島市について正しいものを2つ選びなさい。（ア〜エ）\nア：日本三名園の1つがある\nイ：夏に阿波おどりが行われる\nウ：安芸の宮島がある\nエ：吉野川の河口がある", type:"multi", hints:["イ","エ","ア","ウ"], hintDetails:["イ：阿波おどりは毎年8月に行われる徳島の祭り","エ：吉野川は徳島県を流れ、徳島市付近で海に注ぐ","ア：後楽園は岡山市にある（徳島ではない）","ウ：安芸の宮島は広島県（徳島ではない）"], answer:["イ","エ"], explanation:"イとエが正しい。ア（後楽園）は岡山市、ウ（安芸の宮島）は広島県です。" },
  { section:7, category:"第12回・問3-1", text:"宇和海沿岸ではある魚が養殖されています。この海を「□海」という（漢字2字）。□は？", type:"free", hints:["宇和","瀬戸内","豊後","土佐"], answer:"宇和", explanation:"宇和海（うわかい）が正解。愛媛県南部に広がる海で、鯛などの養殖が盛んです。" },
  { section:7, category:"第12回・問4", text:"瀬戸内しまなみ海道が通る2つの県は？（記号ア〜オで）\nあ＝鳥取・い＝島根・う＝広島・え＝愛媛・お＝山口", type:"free", hints:["う（広島）とえ（愛媛）","あとい","いとう","えとお"], answer:"う（広島）とえ（愛媛）", altAnswers:["うとえ","広島と愛媛","う・え"], explanation:"しまなみ海道は広島県（尾道）と愛媛県（今治）を結んでいます。" },
  { section:7, category:"第12回・問1B", text:"製鉄所がある広島県の都市は？（ア〜エ）\nア：坂出　イ：福山　ウ：宇部　エ：防府", type:"free", hints:["イ（福山）","ア（坂出）","ウ（宇部）","エ（防府）"], answer:"イ（福山）", altAnswers:["イ","福山"], explanation:"福山市（広島県）が正解。鉄鋼業がさかんな工業都市です。" },
  { section:7, category:"第12回・問1-5", text:"瀬戸内工業地域の工業生産額で最も多い業種はどれ？", type:"free", hints:["化学工業","金属工業","機械工業","食料品工業"], answer:"化学工業", explanation:"瀬戸内工業地域は石油化学コンビナートが多く、化学工業の割合が高いのが特徴です。" },
  { section:7, category:"第12回・問2-1A", text:"中国地方最高峰で「伯耆富士」ともよばれる山は？（○○山）", type:"free", hints:["大山","蒜山","三瓶山","比婆山"], answer:"大山", explanation:"大山（だいせん）が正解。鳥取県にある標高1729mの山です。" },
  { section:7, category:"第12回・問2-1B", text:"島根県東部にあり、長い歴史をもつ「□大社」の□は？", type:"free", hints:["出雲","熊野","伊勢","春日"], answer:"出雲", explanation:"出雲大社（いずもたいしゃ）が正解。縁結びの神様として知られます。" },
  { section:7, category:"第12回・問2-4", text:"島根県松江市にある、しじみがとれることで知られる湖は？（○○湖）", type:"free", hints:["宍道湖","中海","浜名湖","諏訪湖"], answer:"宍道湖", explanation:"宍道湖（しんじこ）が正解。シジミの産地として有名です。" },
  { section:7, category:"第12回・問3-1", text:"鳥取県の日本海側に広がる、東西15km以上の大きな砂丘の名は？（○○砂丘）", type:"free", hints:["鳥取砂丘","入道崎砂丘","中田島砂丘","吹上浜"], answer:"鳥取砂丘", explanation:"鳥取砂丘（とっとりさきゅう）が正解。日本最大級の砂丘です。" },
  { section:7, category:"第12回・問4", text:"人口が少ない中国・四国地方で、地域の人口が大きく減り生活や産業が成り立たなくなることを何という？（2字）", type:"free", hints:["過疎","過密","過剰","限界"], answer:"過疎", explanation:"過疎（かそ）が正解。" },
  { section:7, category:"第12回・問5", text:"高知県（太平洋側）で生産量全国1位（2023年）の野菜は？", type:"free", hints:["なす","キャベツ","たまねぎ","トマト"], answer:"なす", explanation:"なすが正解。高知県は促成栽培がさかんで、なすの生産量が全国1位です。" },
  { section:7, category:"第12回・問6", text:"大きなダムがないことなどから「最後の清流」とよばれる、四国地方最長の川は？（○○川）", type:"free", hints:["四万十川","吉野川","仁淀川","物部川"], answer:"四万十川", explanation:"四万十川（しまんとがわ）が正解。高知県を流れる清流です。" },
  { section:7, category:"第12回・問8-1", text:"讃岐平野（香川県）の降水量が少ない理由を答えなさい。（具体的な地形の名を用いて）", type:"text", answer:"夏と冬の湿った季節風が、中国山地と四国山地にさえぎられるから。", explanation:"中国山地が日本海側からの季節風を、四国山地が太平洋側からの季節風をさえぎるため、讃岐平野は降水量が少なくなります。" },
  { section:7, category:"第12回・問8-2", text:"讃岐平野の水不足解消のためにつくられた、吉野川の水を引く用水の名は？（○○用水）", type:"free", hints:["香川用水","讃岐用水","吉野用水","四国用水"], answer:"香川用水", explanation:"香川用水（かがわようすい）が正解。吉野川から水を引いて讃岐平野に供給しています。" },
  { section:7, category:"第12回・問9", text:"生口島（広島県）でさかんにつくられ、広島県の生産量が日本一のかんきつ類は？", type:"free", hints:["レモン","みかん","マスカット","キウイ"], answer:"レモン", explanation:"レモンが正解。広島県はレモンの生産量が日本一です。" },
  { section:7, category:"第12回・問10", text:"オリーブの栽培がさかんな、瀬戸内海で2番目に大きな島の名は？（○○島）", type:"free", hints:["小豆島","淡路島","因島","大三島"], answer:"小豆島", explanation:"小豆島（しょうどしま）が正解。香川県に属し、オリーブの産地として有名です。" },

  // === 第13回 近畿地方 ===
  { section:8, category:"第13回・問1", text:"東海道新幹線の下りの終点が起点となっている新幹線の名は？（○○新幹線）", type:"free", hints:["山陽新幹線","九州新幹線","東北新幹線","北陸新幹線"], answer:"山陽新幹線", explanation:"山陽新幹線（さんようしんかんせん）が正解。新大阪駅から博多駅を結びます。" },
  { section:8, category:"第13回・問2", text:"日本で初めての本格的な高速道路として1965年に全線開通した高速道路は？", type:"free", hints:["名神高速道路","東名高速道路","中央自動車道","中国自動車道"], answer:"名神高速道路", explanation:"名神高速道路（めいしんこうそくどうろ）が正解。愛知県〜兵庫県を結ぶ日本初の本格高速道路です。" },
  { section:8, category:"第13回・問3", text:"四国から近畿へ自動車で行くとき、淡路島を経由して渡る橋を通る順は？", type:"free", hints:["大鳴門橋→明石海峡大橋","明石海峡大橋→大鳴門橋","瀬戸大橋→明石海峡大橋","明石海峡大橋→瀬戸大橋"], answer:"大鳴門橋→明石海峡大橋", altAnswers:["ア"], explanation:"四国側から大鳴門橋で淡路島に渡り、明石海峡大橋で本州（神戸）に渡ります。" },
  { section:8, category:"第13回・問4", text:"神戸港の人工島（○○アイランド）の○○は？（○○山地の土を使ってつくられた）", type:"free", hints:["六甲","比叡","生駒","金剛"], answer:"六甲", explanation:"六甲アイランド・ポートアイランドが正解。六甲山地の土を削ってつくられました。" },
  { section:8, category:"第13回・問5", text:"大阪湾の海上にある、24時間離着陸できる空港は？", type:"free", hints:["関西国際空港","大阪国際空港","中部国際空港","神戸空港"], answer:"関西国際空港", explanation:"関西国際空港（かんさいこくさいくうこう）が正解。海上空港のため騒音の心配がなく24時間対応。" },
  { section:8, category:"第13回・問6", text:"「近畿」ということばは「□の近く」という意味です。□をひらがな3字で答えなさい。", type:"free", hints:["みやこ","おおさか","きょうと","なにわ"], answer:"みやこ", explanation:"「みやこ（都）」が正解。近畿＝都の近く、という意味です。" },
  { section:8, category:"第13回・問7C", text:"奈良県にある世界文化遺産で、世界最古の木造建築があることで知られる建築物は？", type:"free", hints:["法隆寺","東大寺","春日大社","唐招提寺"], answer:"法隆寺", explanation:"法隆寺（ほうりゅうじ）が正解。世界最古の木造建築として知られます。" },
  { section:8, category:"第13回・問7D", text:"京都府宇治市にある、10円玉の絵柄としても知られる世界文化遺産は？", type:"free", hints:["平等院鳳凰堂","金閣寺","清水寺","伏見稲荷大社"], answer:"平等院鳳凰堂", explanation:"平等院鳳凰堂（びょうどういんほうおうどう）が正解。宇治市にある世界文化遺産です。" },
  { section:8, category:"第13回・問8", text:"兵庫県にある、「白鷺城」ともよばれる世界文化遺産の城は？（○○城）", type:"free", hints:["姫路城","大阪城","彦根城","松本城"], answer:"姫路城", explanation:"姫路城（ひめじじょう）が正解。兵庫県姫路市にある世界文化遺産です。" },
  { section:8, category:"第13回・問9-1", text:"京都でつくられている伝統的工芸品ではないものはどれ？\nア：京友禅　イ：西陣織　ウ：大島つむぎ　エ：丹後ちりめん", type:"free", hints:["ウ（大島つむぎ）","ア（京友禅）","イ（西陣織）","エ（丹後ちりめん）"], answer:"ウ（大島つむぎ）", altAnswers:["ウ","大島つむぎ"], explanation:"大島つむぎは鹿児島県の奄美大島でつくられる伝統的工芸品です。" },
  { section:8, category:"第13回・問9-2", text:"京都市で毎年7月に行われる、1000年以上の歴史がある祭りの名は？（ひらがな3字）", type:"free", hints:["ぎおん（祭）","あおい（祭）","じだい（祭）","おだわら"], answer:"ぎおん", altAnswers:["ぎおん祭","祇園祭"], explanation:"祇園祭（ぎおんまつり）が正解。" },
  { section:8, category:"第13回・問10", text:"信楽焼（しがらきやき）がつくられている府県は？（○○県）", type:"free", hints:["滋賀県","京都府","奈良県","三重県"], answer:"滋賀県", explanation:"滋賀県（甲賀市信楽町）が正解。たぬきの置物でも有名です。" },
  { section:8, category:"第13回②・問2-1", text:"琵琶湖から流れ出る川は、大阪府では何とよばれますか？", type:"free", hints:["淀川","宇治川","瀬田川","大和川"], answer:"淀川", explanation:"淀川（よどがわ）が正解。滋賀県→瀬田川、京都府→宇治川、大阪府→淀川と名前が変わります。" },
  { section:8, category:"第13回②・問4", text:"神戸市がある兵庫県にある、世界文化遺産に登録されている城は？", type:"free", hints:["姫路城","大阪城","和歌山城","彦根城"], answer:"姫路城", explanation:"姫路城（ひめじじょう）が正解。" },
  { section:8, category:"第13回②・問6", text:"京都を代表する伝統的工芸品で、清水寺に向かう坂道の周辺でつくられてきた焼き物は？", type:"free", hints:["清水焼","有田焼","九谷焼","信楽焼"], answer:"清水焼", explanation:"清水焼（きよみずやき）が正解。清水坂の周辺で作られてきたことが名前の由来です。" },
  { section:8, category:"第13回②・問7", text:"関西国際空港がある大阪湾に面する工業地帯は？（○○工業地帯）", type:"free", hints:["阪神工業地帯","中京工業地帯","京浜工業地帯","北九州工業地域"], answer:"阪神工業地帯", explanation:"阪神工業地帯（はんしんこうぎょうちたい）が正解。大阪湾沿岸に広がります。" },

  // === 第14回 中部地方 ===
  { section:9, category:"第14回・問1A", text:"工業生産額が日本一の工業地帯「□工業地帯」の□は？（漢字2字）", type:"free", hints:["中京","阪神","京浜","北九州"], answer:"中京", explanation:"中京工業地帯（ちゅうきょうこうぎょうちたい）が正解。愛知・三重・岐阜に広がります。" },
  { section:9, category:"第14回・問1C", text:"長野県にある、電子工業が発達した湖「□湖」の□は？（諏訪市・岡谷市がある）", type:"free", hints:["諏訪","琵琶","浜名","中禅寺"], answer:"諏訪", explanation:"諏訪湖（すわこ）が正解。長野県中部にある湖で、周辺に精密機器・電子工業が集積。" },
  { section:9, category:"第14回・問2", text:"東海工業地域について正しいものはどれ？\nイ：鉄鋼の生産額が日本一の県のみ\nウ：東海市では鉄鋼の生産がさかん\nエ：浜松市は県の東部に位置する", type:"free", hints:["ウ（東海市で鉄鋼生産）","ア（紙の生産額日本一）","イ（鉄鋼日本一の県のみ）","エ（浜松市は東部）"], answer:"ウ（東海市で鉄鋼生産）", altAnswers:["ウ"], explanation:"ウが正解。東海市（愛知県）は鉄鋼業がさかんです。東海工業地域は静岡県に広がる工業地域。" },
  { section:9, category:"第14回・問3", text:"諏訪湖周辺でかつてさかんだった「□をつくる製糸業」の□は？", type:"free", hints:["生糸","綿糸","麻糸","毛糸"], answer:"生糸", explanation:"生糸（きいと）が正解。蚕（かいこ）から取れる糸で、諏訪湖周辺はかつて製糸業の中心地でした。" },
  { section:9, category:"第14回・問4", text:"中京工業地帯から自動車が輸出される、貿易額が全国3位以内に入る貿易港は？（○○港）", type:"free", hints:["名古屋港","横浜港","神戸港","大阪港"], answer:"名古屋港", explanation:"名古屋港（なごやこう）が正解。自動車の輸出額が日本最大の貿易港です。" },
  { section:9, category:"第14回・問5", text:"愛知県にある、古くから陶磁器の生産がさかんな都市は？", type:"free", hints:["瀬戸市","多治見市","燕市","四日市市"], answer:"瀬戸市", explanation:"瀬戸市（せとし）が正解。「せともの」という言葉の語源となった陶磁器の産地です。" },
  { section:9, category:"第14回・問6", text:"石川県の能登半島にある工業都市で、輪島塗が伝統的工芸品の都市は？", type:"free", hints:["輪島市","金沢市","七尾市","珠洲市"], answer:"輪島市", explanation:"輪島市（わじまし）が正解。輪島塗（わじまぬり）が有名な伝統的工芸品です。" },
  { section:9, category:"第14回・問8", text:"中部地方の政令指定都市のうち、人口が最も多い都市は？", type:"free", hints:["名古屋市","静岡市","浜松市","新潟市"], answer:"名古屋市", explanation:"名古屋市（なごやし）が正解。東京・横浜・大阪に次いで全国4番目の人口規模です。" },
  { section:9, category:"第14回・問9", text:"山頂をこえて乾燥した空気が吹き下ろすときに温度が上がる現象をカタカナで何という？", type:"free", hints:["フェーン現象","モンスーン","エルニーニョ","ラニーニャ"], answer:"フェーン現象", altAnswers:["フェーン"], explanation:"フェーン現象（フェーンげんしょう）が正解。新潟県や富山県などで発生しやすい現象です。" },
  { section:9, category:"第14回・問10", text:"豊田市がある工業地帯「□工業地帯」（豊田市の自動車工業で有名）の□は？", type:"free", hints:["中京","阪神","京浜","東海"], answer:"中京", explanation:"中京工業地帯が正解。" },
  { section:9, category:"第14回②・問1A", text:"長野県で、野辺山原の高原野菜の栽培がさかんな山のふもとにある山は？", type:"free", hints:["八ヶ岳","浅間山","御嶽山","駒ヶ岳"], answer:"八ヶ岳", explanation:"八ヶ岳（やつがたけ）が正解。長野・山梨の県境にある山で、野辺山原はその北麓にあります。" },
  { section:9, category:"第14回②・問2", text:"新潟県にある「金の生産地だった島」で、現在はトキが飼われている島は？（○○島）", type:"free", hints:["佐渡島","隠岐島","対馬","種子島"], answer:"佐渡島", altAnswers:["佐渡"], explanation:"佐渡島（さどしま）が正解。かつて金山があり、現在はトキの保護で知られます。" },
  { section:9, category:"第14回②・問4", text:"愛知県南東部の半島で、豊川用水が引かれ電照菊の栽培がさかんな半島は？（○○半島）", type:"free", hints:["渥美半島","知多半島","伊豆半島","能登半島"], answer:"渥美半島", explanation:"渥美半島（あつみはんとう）が正解。愛知県南東部に突き出た半島で、花の栽培がさかんです。" },
  { section:9, category:"第14回②・問4説明", text:"電照菊を栽培するとき、電灯を用いる目的は？（20字以内）", type:"text", answer:"開花の時期をおくらせて、出荷の時期を調整するため。", explanation:"菊は日照時間が短くなると花が咲く性質があります。電灯で照らすことで開花を遅らせ、市場に出回りにくい時期に出荷して高値で売ることができます。" },
  { section:9, category:"第14回②・問6", text:"石川県金沢市に新幹線の駅がある「□新幹線」の□は？（漢字2字）", type:"free", hints:["北陸","東海道","山陽","九州"], answer:"北陸", explanation:"北陸新幹線（ほくりくしんかんせん）が正解。東京〜金沢〜福井・敦賀を結びます。" },
  { section:9, category:"第14回②・問7-1", text:"新潟県の平野では積雪期間が長いため米の「□□」地帯となっています。□は？（漢字2字）", type:"free", hints:["単作","二毛作","二期作","輪作"], answer:"単作", explanation:"単作（たんさく）が正解。雪が多く稲作しかできないため、1年に1回しか作物を作れません。" },
  { section:9, category:"第14回②・問7-2", text:"日本で最も長い川で、新潟県を流れる川は？（○○川）", type:"free", hints:["信濃川","利根川","石狩川","天竜川"], answer:"信濃川", explanation:"信濃川（しなのがわ）が正解。日本最長の川で、新潟市付近で日本海に注ぎます。" },
  { section:9, category:"第14回②・問8", text:"富山県南東部にある、黒部ダムがある山脈は？（○○山脈）", type:"free", hints:["飛騨山脈","赤石山脈","木曽山脈","鈴鹿山脈"], answer:"飛騨山脈", explanation:"飛騨山脈（ひださんみゃく）が正解。北アルプスとも呼ばれ、黒部ダムがあります。" },
  { section:9, category:"第14回②・問9", text:"山梨県（甲府盆地）と長野県で生産量1位・2位を争うくだものは？", type:"free", hints:["ぶどう","りんご","もも","おうとう"], answer:"ぶどう", explanation:"ぶどうが正解。山梨県が生産量1位、長野県が2位（2022年）です。" },
  { section:9, category:"第14回③・問2", text:"京都府北部の丹後半島の付け根にある日本三景のひとつは？", type:"free", hints:["天橋立","松島","宮島","和歌の浦"], answer:"天橋立", explanation:"天橋立（あまのはしだて）が正解。日本三景は天橋立・松島・宮島です。" },
  { section:9, category:"第14回③・問6", text:"淡路島がある県の、兵庫県の造船業がさかんな都市（政令指定都市）は？", type:"free", hints:["神戸市","姫路市","尼崎市","明石市"], answer:"神戸市", explanation:"神戸市（こうべし）が正解。阪神工業地帯の中心都市で造船業が発達しています。" },
  { section:9, category:"第14回③・問8", text:"和歌山県の生産量が全国の半分以上をしめるくだものは？", type:"free", hints:["うめ","みかん","レモン","もも"], answer:"うめ", explanation:"うめが正解。和歌山県は梅の生産量が全国1位で、全国の約60%を占めます。" }
];

let currentIndex=0, score=0, results=[], shuffled=[];
let activeSections = new Set([1,2,3,4,5,6,7,8,9]);
let hintShown = false;
let currentQ = null;

function toggleSection(btn) {
  const s = parseInt(btn.dataset.section);
  if (activeSections.has(s)) {
    if (activeSections.size === 1) return;
    activeSections.delete(s); btn.classList.remove('active');
  } else {
    activeSections.add(s); btn.classList.add('active');
  }
  document.getElementById('total-count').textContent = allQuestions.filter(q => activeSections.has(q.section)).length;
}

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}

function startQuiz() {
  shuffled = shuffle(allQuestions.filter(q=>activeSections.has(q.section)));
  currentIndex=0; score=0; results=[];
  hide('start-screen'); show('quiz-screen');
  showQuestion();
}

function showQuestion() {
  currentQ = shuffled[currentIndex];
  const q = currentQ;
  const total = shuffled.length;
  hintShown = false;

  document.getElementById('q-label').textContent = q.category;
  document.getElementById('q-counter').textContent = (currentIndex+1)+' / '+total;
  document.getElementById('prog').style.width = (currentIndex/total*100)+'%';
  document.getElementById('q-category').textContent = q.category;
  document.getElementById('q-text').textContent = q.text;

  hide('answer-area');
  show('input-area');

  if (q.type === 'multi') {
    hide('input-area');
    show('input-area');
    document.getElementById('input-area').innerHTML = buildMultiUI(q);
  } else if (q.type === 'text') {
    document.getElementById('input-area').innerHTML = buildTextUI(q);
  } else {
    document.getElementById('input-area').innerHTML = buildFreeUI(q);
    setTimeout(()=>{ const el=document.getElementById('ans-input'); if(el)el.focus(); },100);
  }
}

function buildFreeUI(q) {
  return `<div class="input-row">
    <input class="ans-input" id="ans-input" type="text" placeholder="ここに答えを入力…" autocomplete="off" onkeydown="if(event.key==='Enter')submitAnswer()" />
    <button class="btn btn-primary btn-sm" onclick="submitAnswer()">答える</button>
  </div>
  <div id="hint-section">
    <button class="hint-toggle" onclick="toggleHint()">💡 ヒント（選択肢）を見る</button>
    <div id="hint-box" class="hint-box hidden">
      <div class="hint-label">ヒント：選択肢</div>
      <div class="hint-choices" id="hint-choices">${q.hints.map(h=>`<span class="hint-choice" onclick="fillHint('${h}')">${h}</span>`).join('')}</div>
    </div>
  </div>`;
}

function buildTextUI(q) {
  return `<div class="note-box" style="margin-bottom:10px;">記述問題です。自分で答えを考えてから「答えを見る」を押してください。</div>
  <button class="btn" onclick="showTextAnswer()">答えを見る</button>`;
}

function buildMultiUI(q) {
  const keys = ['ア','イ','ウ','エ'];
  const checks = keys.map((k,i)=>`<label class="multi-check"><input type="checkbox" value="${k}" id="cb${k}"> ${k}</label>`).join('');
  const hintDetails = q.hintDetails ? q.hintDetails.map(d=>`<div>・${d}</div>`).join('') : '';
  return `<div style="font-size:13px;color:var(--text2);margin-bottom:8px;">正しいものをすべて選んでください</div>
  <div class="multi-check-row">${checks}</div>
  <button class="hint-toggle" onclick="toggleHintMulti(this)">💡 ヒント（選択肢の内容）を見る</button>
  <div id="hint-box-multi" class="hint-box hidden">
    <div class="hint-label">ヒント：各選択肢</div>
    <div style="font-size:13px;line-height:1.8;color:var(--yellow-text);">${hintDetails}</div>
  </div>
  <button class="btn btn-primary" style="margin-top:10px;" onclick="submitMulti()">答える</button>`;
}

function toggleHint() {
  const box = document.getElementById('hint-box');
  if (!box) return;
  box.classList.toggle('hidden');
  hintShown = true;
}

function toggleHintMulti(btn) {
  const box = document.getElementById('hint-box-multi');
  if (!box) return;
  box.classList.toggle('hidden');
  hintShown = true;
}

function fillHint(val) {
  const input = document.getElementById('ans-input');
  if (input) { input.value = val; input.focus(); }
}

function normalize(str) {
  return str.trim().replace(/\s+/g,'').replace(/[　]/g,'').toLowerCase()
    .replace(/[ａ-ｚＡ-Ｚ０-９]/g, c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));
}

function checkAnswer(userAns, q) {
  const u = normalize(userAns);
  const correct = normalize(q.answer);
  if (u === correct) return true;
  if (q.altAnswers) {
    for (const alt of q.altAnswers) { if (u === normalize(alt)) return true; }
  }
  return false;
}

function submitAnswer() {
  const q = currentQ;
  const input = document.getElementById('ans-input');
  if (!input || input.value.trim() === '') return;
  const userAns = input.value.trim();
  input.disabled = true;
  const isCorrect = checkAnswer(userAns, q);
  showAnswerBox(isCorrect, q, userAns);
}

function submitMulti() {
  const q = currentQ;
  const checked = [...document.querySelectorAll('.multi-check input:checked')].map(el=>el.value).sort();
  const correct = [...q.answer].sort();
  const isCorrect = JSON.stringify(checked) === JSON.stringify(correct);
  document.querySelectorAll('.multi-check input').forEach(el=>el.disabled=true);
  showAnswerBox(isCorrect, q, checked.join('・'));
}

function showTextAnswer() {
  const q = currentQ;
  hide('input-area');
  show('answer-area');
  const ab = document.getElementById('answer-box');
  ab.className = 'answer-box neutral';
  ab.innerHTML = `<div class="mark">📝 模範解答</div><div class="correct-ans">${q.answer}</div><div class="exp">${q.explanation}</div>`;
  results.push({q, correct:null});
}

function showAnswerBox(isCorrect, q, userAns) {
  hide('input-area');
  show('answer-area');
  if (isCorrect) score++;
  const ab = document.getElementById('answer-box');
  ab.className = 'answer-box ' + (isCorrect ? 'correct' : 'wrong');
  const ansText = Array.isArray(q.answer) ? q.answer.join('・') : q.answer;
  const hintPenalty = hintShown && isCorrect ? '<div style="font-size:12px;margin-top:4px;opacity:0.7;">（ヒントあり）</div>' : '';
  ab.innerHTML = `<div class="mark">${isCorrect ? '◯ 正解！' : '✕ 不正解'}</div>${hintPenalty}<div class="correct-ans">正解：${ansText}</div><div class="exp">${q.explanation}</div>`;
  results.push({q, correct:isCorrect});
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= shuffled.length) showResult();
  else showQuestion();
}

function showResult() {
  hide('quiz-screen'); show('result-screen');
  document.getElementById('retry-wrong-btn').style.display = 'block';
  const wrongCount = results.filter(r => r.correct === false).length;
  const retryBtn = document.getElementById('retry-wrong-btn');
  if (wrongCount === 0) retryBtn.style.display = 'none';
  else retryBtn.textContent = `まちがえた ${wrongCount} 問だけもう一度 →`;
  const judged = results.filter(r=>r.correct!==null);
  const sc = judged.filter(r=>r.correct).length;
  document.getElementById('result-score').textContent = sc+' / '+judged.length+' 問正解';
  const pct = judged.length>0 ? Math.round(sc/judged.length*100) : 0;
  document.getElementById('result-msg').textContent = pct>=80 ? '🎉 すばらしい！よく復習できています' : pct>=50 ? 'もう少し！もう一度チャレンジしてみよう' : 'もう一度しっかり復習しよう！';
  document.getElementById('result-detail').innerHTML = results.map(r=>{
    const icon = r.correct===null ? '📝' : r.correct ? '◯' : '✕';
    const cls = r.correct===null ? 'memo' : r.correct ? 'ok' : 'ng';
    return `<div class="result-item"><span class="icon ${cls}">${icon}</span><span class="detail">${r.q.category}：${r.q.text.slice(0,28)}…</span></div>`;
  }).join('');
}

function retryWrong() {
  const wrong = results.filter(r => r.correct === false).map(r => r.q);
  if (wrong.length === 0) return;
  shuffled = shuffle(wrong);
  currentIndex = 0; score = 0; results = [];
  hide('result-screen'); show('quiz-screen');
  showQuestion();
}
function restartQuiz() { hide('result-screen'); startQuiz(); }
function goHome() { hide('result-screen'); show('start-screen'); }

document.getElementById('total-count').textContent = allQuestions.filter(q => activeSections.has(q.section)).length;
</script>
</body>
</html>
