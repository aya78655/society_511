<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5年社会 復習クイズ｜九州地方・日本の人口</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f9f8f5; --surface: #ffffff; --surface2: #f2f1ee;
    --border: rgba(0,0,0,0.10); --border2: rgba(0,0,0,0.18);
    --text: #1a1a18; --text2: #6b6b67; --text3: #9b9b97;
    --green-bg: #eaf3de; --green-text: #27500a; --green-border: #97c459;
    --red-bg: #fcebeb; --red-text: #791f1f; --red-border: #f09595;
    --yellow-bg: #faeeda; --yellow-text: #633806; --yellow-border: #efcc7a;
    --accent: #1a1a18; --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
  }
  body { font-family: 'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
  .container { width: 100%; max-width: 580px; }
  .header { text-align: center; margin-bottom: 2rem; }
  .header .tag { display: inline-block; font-size: 19px; letter-spacing: 0.08em; color: var(--text2); border: 0.5px solid var(--border2); border-radius: 20px; padding: 4px 12px; margin-bottom: 12px; }
  .header h1 { font-size: 30px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 6px; }
  .header p { font-size: 18px; color: var(--text2); }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1rem; }
  .start-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
  .start-item { background: var(--surface2); border-radius: var(--radius-sm); padding: 12px 14px; }
  .start-item .label { font-size: 19px; color: var(--text3); margin-bottom: 4px; }
  .start-item .value { font-size: 18px; font-weight: 500; }
  .progress-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; }
  .progress-label { font-size: 18px; color: var(--text2); white-space: nowrap; }
  .progress-bar-bg { flex: 1; height: 3px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s ease; }
  .q-category { font-size: 19px; color: var(--text3); letter-spacing: 0.05em; margin-bottom: 10px; }
  .q-text { font-size: 19px; line-height: 1.8; color: var(--text); white-space: pre-line; }
  .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .ans-input { flex: 1; padding: 12px 14px; font-size: 19px; font-family: inherit; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); outline: none; transition: border-color 0.15s; }
  .ans-input:focus { border-color: var(--accent); }
  .ans-input:disabled { background: var(--surface2); }
  .btn { display: block; width: 100%; padding: 13px; font-size: 18px; font-family: inherit; font-weight: 500; text-align: center; background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius-md); cursor: pointer; color: var(--text); transition: background 0.15s; }
  .btn:hover { background: var(--surface2); }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #333; }
  .btn-sm { padding: 10px 16px; font-size: 19px; width: auto; display: inline-block; }
  .hint-toggle { padding: 8px 14px; font-size: 19px; font-family: inherit; background: var(--yellow-bg); border: 0.5px solid var(--yellow-border); border-radius: var(--radius-sm); cursor: pointer; color: var(--yellow-text); margin-bottom: 10px; transition: background 0.15s; }
  .hint-toggle:hover { background: #f5dfa8; }
  .hint-box { background: var(--yellow-bg); border: 0.5px solid var(--yellow-border); border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 10px; }
  .hint-box .hint-label { font-size: 19px; color: var(--yellow-text); font-weight: 600; margin-bottom: 8px; letter-spacing: 0.05em; }
  .hint-choices { display: flex; flex-wrap: wrap; gap: 6px; }
  .hint-choice { padding: 5px 12px; background: var(--surface); border: 0.5px solid var(--yellow-border); border-radius: 20px; font-size: 19px; cursor: pointer; color: var(--yellow-text); transition: background 0.15s; }
  .hint-choice:hover { background: var(--yellow-border); }
  .answer-box { border-radius: var(--radius-sm); padding: 1rem 1.25rem; font-size: 18px; line-height: 1.7; margin-bottom: 10px; }
  .answer-box.correct { background: var(--green-bg); border: 0.5px solid var(--green-border); color: var(--green-text); }
  .answer-box.wrong { background: var(--red-bg); border: 0.5px solid var(--red-border); color: var(--red-text); }
  .answer-box.neutral { background: var(--surface2); border: 0.5px solid var(--border); color: var(--text); }
  .answer-box .mark { font-weight: 600; margin-bottom: 6px; font-size: 19px; }
  .answer-box .correct-ans { font-weight: 500; margin-bottom: 8px; }
  .answer-box .exp { font-size: 19px; opacity: 0.85; white-space: pre-line; }
  .multi-check-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .multi-check { display: flex; align-items: center; gap: 6px; padding: 7px 12px; border: 0.5px solid var(--border2); border-radius: 20px; font-size: 19px; cursor: pointer; background: var(--surface); }
  .multi-check input { width: 14px; height: 14px; cursor: pointer; }
  .section-btn { background: var(--surface2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 8px 14px; font-size: 19px; font-family: inherit; cursor: pointer; color: var(--text); transition: background 0.15s; }
  .section-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .section-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .result-score { font-size: 52px; font-weight: 600; letter-spacing: -0.03em; margin-bottom: 6px; text-align: center; }
  .result-msg { font-size: 19px; color: var(--text2); text-align: center; margin-bottom: 1.5rem; }
  .result-list { display: flex; flex-direction: column; margin-bottom: 1.5rem; }
  .result-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--border); font-size: 19px; }
  .result-item .icon { font-weight: 600; min-width: 18px; font-size: 18px; }
  .result-item .icon.ok { color: var(--green-text); }
  .result-item .icon.ng { color: var(--red-text); }
  .result-item .icon.memo { color: var(--text2); }
  .result-item .detail { color: var(--text2); line-height: 1.5; }
  .hidden { display: none !important; }
  .action-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .action-row .btn { flex: 1; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="tag">5年社会 予習シリーズ 第11回</div>
    <h1>全問題 復習クイズ</h1>
    <p>全 <span id="total-count"></span> 問</p>
  </div>

  <div id="start-screen">
    <div class="card">
      <div style="font-size:13px;color:var(--text2);margin-bottom:12px;">出題範囲を選んでください（複数選択可）</div>
      <div class="section-row">
        <button class="section-btn active" data-section="1" onclick="toggleSection(this)">第11回①九州</button>
        <button class="section-btn active" data-section="2" onclick="toggleSection(this)">第11回②火山</button>
        <button class="section-btn active" data-section="3" onclick="toggleSection(this)">第11回③人口</button>
        <button class="section-btn active" data-section="4" onclick="toggleSection(this)">第11回④南西諸島</button>
        <button class="section-btn active" data-section="5" onclick="toggleSection(this)">第11回⑤九州旅行</button>
        <button class="section-btn active" data-section="6" onclick="toggleSection(this)">第11回⑥8県の表</button>
      </div>
      <div class="start-grid" style="margin-bottom:1.25rem;">
        <div class="start-item"><div class="label">第11回</div><div class="value">九州地方・南西諸島</div></div>
      </div>
      <button class="btn btn-primary" onclick="startQuiz()">クイズスタート →</button>
    </div>
  </div>

  <div id="quiz-screen" class="hidden">
    <div class="progress-wrap">
      <div class="progress-label" id="q-label"></div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog"></div></div>
      <div class="progress-label" id="q-counter"></div>
    </div>
    <div class="card">
      <div class="q-category" id="q-category"></div>
      <div class="q-text" id="q-text"></div>
    </div>

    <div id="input-area">
      <div class="input-row">
        <input class="ans-input" id="ans-input" type="text" placeholder="ここに答えを入力…" autocomplete="off" />
        <button class="btn btn-primary btn-sm" id="submit-btn" onclick="submitAnswer()">答える</button>
      </div>
      <div id="hint-section">
        <button class="hint-toggle" id="hint-btn" onclick="toggleHint()">💡 ヒント（選択肢）を見る</button>
        <div id="hint-box" class="hint-box hidden">
          <div class="hint-label">ヒント：選択肢</div>
          <div class="hint-choices" id="hint-choices"></div>
        </div>
      </div>
      <div id="multi-area" class="hidden">
        <div style="font-size:13px;color:var(--text2);margin-bottom:8px;">正しいものをすべて選んでください</div>
        <div class="multi-check-row" id="multi-checks"></div>
        <button class="hint-toggle" id="hint-btn-multi" onclick="toggleHint()">💡 ヒント（選択肢の内容）を見る</button>
        <div id="hint-box-multi" class="hint-box hidden">
          <div class="hint-label">ヒント：各選択肢</div>
          <div id="hint-choices-multi" style="font-size:13px;line-height:1.8;color:var(--yellow-text);"></div>
        </div>
        <button class="btn btn-primary" style="margin-top:10px;" onclick="submitMulti()">答える</button>
      </div>
    </div>

    <div id="answer-area" class="hidden">
      <div id="answer-box" class="answer-box"></div>
      <button class="btn" onclick="nextQuestion()">次の問題へ →</button>
    </div>
  </div>

  <div id="result-screen" class="hidden">
    <div class="card">
      <div class="result-score" id="result-score"></div>
      <div class="result-msg" id="result-msg"></div>
      <div class="result-list" id="result-detail"></div>
      <button class="btn btn-primary" style="margin-bottom:8px;" onclick="retryWrong()" id="retry-wrong-btn">まちがえた問題だけもう一度 →</button>
      <div class="action-row">
        <button class="btn" onclick="restartQuiz()">全問もう一度</button>
        <button class="btn" onclick="goHome()">トップへ</button>
      </div>
    </div>
  </div>
</div>

<script>
const allQuestions = [
  { section:1, category:"大問1・問1", text:"沖縄の「□城」——世界文化遺産にも登録されているこのお城の「□」に入る漢字は？", type:"free", hints:["首里","中城","今帰仁","座喜味"], answer:"首里", explanation:"首里城（しゅりじょう）が正解。琉球王国の城で、世界文化遺産に登録されています。" },
  { section:1, category:"大問1・問1", text:"沖縄の世界文化遺産「□王国」の遺跡がみられます。□に入る漢字2字は？", type:"free", hints:["琉球","薩摩","大和","鎌倉"], answer:"琉球", explanation:"琉球王国（りゅうきゅうおうこく）が正解。現在の沖縄県にあった王国です。" },
  { section:1, category:"大問1・問1", text:"福岡県で、筑紫平野に位置しゴム製品や繊維物が有名な市（人口3番目）はどこ？（○○市）", type:"free", hints:["久留米","大牟田","飯塚","直方"], answer:"久留米", altAnswers:["久留米市"], explanation:"久留米市（くるめし）が正解。ブリヂストン発祥地としても有名で、ゴム製品の生産がさかんです。" },
  { section:1, category:"大問1・問2", text:"福岡県で「あまおう」という品種の栽培がさかんな農作物はどれ？", type:"free", hints:["いちご","トマト","みかん","ぶどう"], answer:"いちご", explanation:"「あまおう」はいちごの品種です。福岡県は全国有数のいちごの産地です。" },
  { section:1, category:"大問1・問3", text:"九州地方を流れる三大急流のひとつで、熊本県を流れる川の名前は？（○○川）", type:"free", hints:["球磨川","筑後川","大淀川","吉野川"], answer:"球磨川", altAnswers:["球磨"], explanation:"球磨川（くまがわ）が正解。最上川・富士川とならぶ日本三大急流のひとつです。" },
  { section:1, category:"大問1・問4", text:"沖縄では降水量が多いのに水不足になりがちでした。その理由を簡単に答えなさい。", type:"text", answer:"川が短く急で、雨水がすぐ海に流れ出てしまうから", explanation:"沖縄の川は短くて急勾配。雨が降ってもすぐ海へ流れ出てしまい、水をためておくことができません。また島の岩盤が水を通しやすい性質も影響しています。" },
  { section:1, category:"大問1・問5", text:"沖縄島の面積のうちアメリカ軍基地がしめる割合に最も近いものは？", type:"free", hints:["約8%","約15%","約30%","約70%"], answer:"約15%", explanation:"沖縄島の約15%がアメリカ軍基地です。" },
  { section:1, category:"大問1・問6-1", text:"福岡市の気候の特徴として正しいものは？（ア〜エで答えてもOK）\nア：年平均気温15.0℃・年降水量2402mm\nイ：年平均気温17.7℃・年降水量2511mm\nウ：年平均気温15.8℃・年降水量1528mm\nエ：年平均気温17.3℃・年降水量1687mm", type:"free", hints:["ア（金沢市）","イ（宮崎市）","ウ（東京）","エ（福岡市）"], answer:"エ", altAnswers:["エ（福岡市）","年平均気温17.3℃・年降水量1687mm"], explanation:"エ（年平均気温17.3℃・年降水量1687mm）が福岡市。アは金沢市（冬に降水多い日本海側）、イは宮崎市（夏の降水量が非常に多い）、ウは東京です。" },
  { section:1, category:"大問1・問6-2", text:"福岡市にある、山陽新幹線と九州新幹線の起点となる駅の名前は？（○○駅）", type:"free", hints:["博多","福岡","小倉","新福岡"], answer:"博多", altAnswers:["博多駅"], explanation:"博多駅（はかたえき）が正解。山陽新幹線と九州新幹線の2つの新幹線の起点です。" },
  { section:1, category:"大問1・問7", text:"北九州市の工業について、正しい文をすべて選んでください。\nア・イ・ウ・エ の記号で答えなさい。\nア：大戦前、石炭を用いて鉄鋼を生産\nイ：高度経済成長期に四大公害病の1つが発生\nウ：金属工業の割合が最も多い\nエ：エコタウン事業・SDGsモデル都市", type:"multi", hints:["ア","イ","ウ","エ"], hintDetails:["ア：大戦前、筑豊炭田の石炭で鉄鋼生産（八幡製鉄所）","イ：四大公害病＝水俣病・第二水俣病・イタイイタイ病・四日市ぜんそく","ウ：現在の北九州工業地域は機械工業が最多","エ：エコタウン事業が進められ、SDGsモデル都市に選定"], answer:["ア","エ"], explanation:"正解はア・エ。\nイ→×：北九州の公害は四大公害病に含まれない。\nウ→×：現在は機械工業の割合が最も多い。" },
  { section:1, category:"大問1・問8", text:"筑紫平野を流れ、下流が福岡県と佐賀県の県境となっている川の名前は？（○○川）", type:"free", hints:["筑後川","球磨川","大淀川","遠賀川"], answer:"筑後川", altAnswers:["筑後"], explanation:"筑後川（ちくごがわ）が正解。「筑紫次郎」ともよばれる暴れ川で、有明海にそそぎます。" },

  { section:2, category:"大問2・問1", text:"阿蘇山がある県はどこ？（○○県）", type:"free", hints:["熊本県","大分県","宮崎県","鹿児島県"], answer:"熊本県", altAnswers:["熊本"], explanation:"阿蘇山は熊本県の北東部に位置します。" },
  { section:2, category:"大問2・問1", text:"阿蘇山の火山活動によってできた広大なくぼ地を何という？（カタカナ）", type:"free", hints:["カルデラ","マグマ","カルスト","クレーター"], answer:"カルデラ", explanation:"カルデラが正解。阿蘇山のカルデラは世界最大級で、その中に人が住んでいます。" },
  { section:2, category:"大問2・問1", text:"長崎県の島原半島にある、1991年に大規模な噴火があった火山は？", type:"free", hints:["雲仙岳","霧島山","桜島","阿蘇山"], answer:"雲仙岳", altAnswers:["雲仙"], explanation:"雲仙岳（うんぜんだけ）が正解。普賢岳はその一部で、1991年の噴火では多くの犠牲者が出ました。" },
  { section:2, category:"大問2・問2", text:"桜島は噴火によってどの半島と陸続きになりましたか？（○○半島）", type:"free", hints:["知多半島","紀伊半島","薩摩半島","大隅半島"], answer:"大隅半島", altAnswers:["大隅"], explanation:"大隅半島（おおすみはんとう）が正解。鹿児島県東部の昔の国の名は「大隅国」です。" },
  { section:2, category:"大問2・問3", text:"福岡空港を2023年に利用した外国人の半分以上は、どの国の人でしたか？", type:"free", hints:["韓国","中国","アメリカ","オーストラリア"], answer:"韓国", explanation:"福岡は韓国に近く、釜山からフェリーでも来られる距離。韓国からの訪問者が最も多いです。" },
  { section:2, category:"大問2・問4", text:"九州地方は「□」の生産がさかんで「シリコンアイランド」とよばれてきました。□に入るものは？", type:"free", hints:["半導体","自動車","陶磁器","プラスチック"], answer:"半導体", explanation:"半導体（はんどうたい）が正解。シリコンは半導体の材料です。九州各地に工場が集まっています。" },
  { section:2, category:"大問2・問5-1", text:"長崎県に属し、昔から朝鮮半島との橋渡し役をつとめてきた島の名前は？", type:"free", hints:["対馬","壱岐","五島","種子島"], answer:"対馬", altAnswers:["対馬島"], explanation:"対馬（つしま）が正解。朝鮮半島まで約50kmと近く、古くから交流の拠点でした。" },
  { section:2, category:"大問2・問5-2", text:"長崎県と佐賀県を結ぶ□新幹線には「温泉」という駅が2つあります。□を漢字3字で答えなさい。", type:"free", hints:["西九州","九州南","肥前長崎","西長崎"], answer:"西九州", explanation:"西九州（にしきゅうしゅう）新幹線が正解。「武雄温泉」駅と「嬉野温泉」駅の2つに「温泉」が入っています。" },
  { section:2, category:"大問2・問6", text:"鹿児島県東部が面する、のりの養殖がさかんな海の名前は？（○○海）", type:"free", hints:["有明海","八代海","錦江湾","周防灘"], answer:"有明海", altAnswers:["有明"], explanation:"有明海（ありあけかい）が正解。長崎・佐賀・福岡・熊本の4県に面し、潮の干満差が大きくのりの養殖がさかんです。" },
  { section:2, category:"大問2・問7-1", text:"地熱発電の発電量が全国第1位（2023年）で、別府温泉があることでも知られる県はどこ？（○○県）", type:"free", hints:["大分県","鹿児島県","熊本県","宮崎県"], answer:"大分県", altAnswers:["大分"], explanation:"大分県（おおいたけん）が正解。別府温泉・由布院温泉があり、地熱発電が全国1位です。" },

let currentIndex=0, score=0, results=[], shuffled=[];
let activeSections = new Set([1,2,3,4,5,6,7,8,9]);
let hintShown = false;
let currentQ = null;

function toggleSection(btn) {
  const s = parseInt(btn.dataset.section);
  if (activeSections.has(s)) {
    if (activeSections.size === 1) return;
    activeSections.delete(s); btn.classList.remove('active');
  } else {
    activeSections.add(s); btn.classList.add('active');
  }
  document.getElementById('total-count').textContent = allQuestions.filter(q => activeSections.has(q.section)).length;
}

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}

function startQuiz() {
  shuffled = shuffle(allQuestions.filter(q=>activeSections.has(q.section)));
  currentIndex=0; score=0; results=[];
  hide('start-screen'); show('quiz-screen');
  showQuestion();
}

function showQuestion() {
  currentQ = shuffled[currentIndex];
  const q = currentQ;
  const total = shuffled.length;
  hintShown = false;

  document.getElementById('q-label').textContent = q.category;
  document.getElementById('q-counter').textContent = (currentIndex+1)+' / '+total;
  document.getElementById('prog').style.width = (currentIndex/total*100)+'%';
  document.getElementById('q-category').textContent = q.category;
  document.getElementById('q-text').textContent = q.text;

  hide('answer-area');
  show('input-area');

  if (q.type === 'multi') {
    hide('input-area');
    show('input-area');
    document.getElementById('input-area').innerHTML = buildMultiUI(q);
  } else if (q.type === 'text') {
    document.getElementById('input-area').innerHTML = buildTextUI(q);
  } else {
    document.getElementById('input-area').innerHTML = buildFreeUI(q);
    setTimeout(()=>{ const el=document.getElementById('ans-input'); if(el)el.focus(); },100);
  }
}

function buildFreeUI(q) {
  return `<div class="input-row">
    <input class="ans-input" id="ans-input" type="text" placeholder="ここに答えを入力…" autocomplete="off" onkeydown="if(event.key==='Enter')submitAnswer()" />
    <button class="btn btn-primary btn-sm" onclick="submitAnswer()">答える</button>
  </div>
  <div id="hint-section">
    <button class="hint-toggle" onclick="toggleHint()">💡 ヒント（選択肢）を見る</button>
    <div id="hint-box" class="hint-box hidden">
      <div class="hint-label">ヒント：選択肢</div>
      <div class="hint-choices" id="hint-choices">${q.hints.map(h=>`<span class="hint-choice" onclick="fillHint('${h}')">${h}</span>`).join('')}</div>
    </div>
  </div>`;
}

function buildTextUI(q) {
  return `<div class="note-box" style="margin-bottom:10px;">記述問題です。自分で答えを考えてから「答えを見る」を押してください。</div>
  <button class="btn" onclick="showTextAnswer()">答えを見る</button>`;
}

function buildMultiUI(q) {
  const keys = ['ア','イ','ウ','エ'];
  const checks = keys.map((k,i)=>`<label class="multi-check"><input type="checkbox" value="${k}" id="cb${k}"> ${k}</label>`).join('');
  const hintDetails = q.hintDetails ? q.hintDetails.map(d=>`<div>・${d}</div>`).join('') : '';
  return `<div style="font-size:13px;color:var(--text2);margin-bottom:8px;">正しいものをすべて選んでください</div>
  <div class="multi-check-row">${checks}</div>
  <button class="hint-toggle" onclick="toggleHintMulti(this)">💡 ヒント（選択肢の内容）を見る</button>
  <div id="hint-box-multi" class="hint-box hidden">
    <div class="hint-label">ヒント：各選択肢</div>
    <div style="font-size:13px;line-height:1.8;color:var(--yellow-text);">${hintDetails}</div>
  </div>
  <button class="btn btn-primary" style="margin-top:10px;" onclick="submitMulti()">答える</button>`;
}

function toggleHint() {
  const box = document.getElementById('hint-box');
  if (!box) return;
  box.classList.toggle('hidden');
  hintShown = true;
}

function toggleHintMulti(btn) {
  const box = document.getElementById('hint-box-multi');
  if (!box) return;
  box.classList.toggle('hidden');
  hintShown = true;
}

function fillHint(val) {
  const input = document.getElementById('ans-input');
  if (input) { input.value = val; input.focus(); }
}

function normalize(str) {
  return str.trim().replace(/\s+/g,'').replace(/[　]/g,'').toLowerCase()
    .replace(/[ａ-ｚＡ-Ｚ０-９]/g, c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));
}

function checkAnswer(userAns, q) {
  const u = normalize(userAns);
  const correct = normalize(q.answer);
  if (u === correct) return true;
  if (q.altAnswers) {
    for (const alt of q.altAnswers) { if (u === normalize(alt)) return true; }
  }
  return false;
}

function submitAnswer() {
  const q = currentQ;
  const input = document.getElementById('ans-input');
  if (!input || input.value.trim() === '') return;
  const userAns = input.value.trim();
  input.disabled = true;
  const isCorrect = checkAnswer(userAns, q);
  showAnswerBox(isCorrect, q, userAns);
}

function submitMulti() {
  const q = currentQ;
  const checked = [...document.querySelectorAll('.multi-check input:checked')].map(el=>el.value).sort();
  const correct = [...q.answer].sort();
  const isCorrect = JSON.stringify(checked) === JSON.stringify(correct);
  document.querySelectorAll('.multi-check input').forEach(el=>el.disabled=true);
  showAnswerBox(isCorrect, q, checked.join('・'));
}

function showTextAnswer() {
  const q = currentQ;
  hide('input-area');
  show('answer-area');
  const ab = document.getElementById('answer-box');
  ab.className = 'answer-box neutral';
  ab.innerHTML = `<div class="mark">📝 模範解答</div><div class="correct-ans">${q.answer}</div><div class="exp">${q.explanation}</div>`;
  results.push({q, correct:null});
}

function showAnswerBox(isCorrect, q, userAns) {
  hide('input-area');
  show('answer-area');
  if (isCorrect) score++;
  const ab = document.getElementById('answer-box');
  ab.className = 'answer-box ' + (isCorrect ? 'correct' : 'wrong');
  const ansText = Array.isArray(q.answer) ? q.answer.join('・') : q.answer;
  const hintPenalty = hintShown && isCorrect ? '<div style="font-size:12px;margin-top:4px;opacity:0.7;">（ヒントあり）</div>' : '';
  ab.innerHTML = `<div class="mark">${isCorrect ? '◯ 正解！' : '✕ 不正解'}</div>${hintPenalty}<div class="correct-ans">正解：${ansText}</div><div class="exp">${q.explanation}</div>`;
  results.push({q, correct:isCorrect});
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= shuffled.length) showResult();
  else showQuestion();
}

function showResult() {
  hide('quiz-screen'); show('result-screen');
  document.getElementById('retry-wrong-btn').style.display = 'block';
  const wrongCount = results.filter(r => r.correct === false).length;
  const retryBtn = document.getElementById('retry-wrong-btn');
  if (wrongCount === 0) retryBtn.style.display = 'none';
  else retryBtn.textContent = `まちがえた ${wrongCount} 問だけもう一度 →`;
  const judged = results.filter(r=>r.correct!==null);
  const sc = judged.filter(r=>r.correct).length;
  document.getElementById('result-score').textContent = sc+' / '+judged.length+' 問正解';
  const pct = judged.length>0 ? Math.round(sc/judged.length*100) : 0;
  document.getElementById('result-msg').textContent = pct>=80 ? '🎉 すばらしい！よく復習できています' : pct>=50 ? 'もう少し！もう一度チャレンジしてみよう' : 'もう一度しっかり復習しよう！';
  document.getElementById('result-detail').innerHTML = results.map(r=>{
    const icon = r.correct===null ? '📝' : r.correct ? '◯' : '✕';
    const cls = r.correct===null ? 'memo' : r.correct ? 'ok' : 'ng';
    return `<div class="result-item"><span class="icon ${cls}">${icon}</span><span class="detail">${r.q.category}：${r.q.text.slice(0,28)}…</span></div>`;
  }).join('');
}

function retryWrong() {
  const wrong = results.filter(r => r.correct === false).map(r => r.q);
  if (wrong.length === 0) return;
  shuffled = shuffle(wrong);
  currentIndex = 0; score = 0; results = [];
  hide('result-screen'); show('quiz-screen');
  showQuestion();
}
function restartQuiz() { hide('result-screen'); startQuiz(); }
function goHome() { hide('result-screen'); show('start-screen'); }

document.getElementById('total-count').textContent = allQuestions.filter(q => activeSections.has(q.section)).length;
</script>
